<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAİS — Saha Yerleşim Planı</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #0d1b4a; font-family: 'Segoe UI', system-ui, sans-serif; }
  canvas { display: block; }
  #ui { position: absolute; top: 0; left: 0; right: 0; bottom: 0; pointer-events: none; }
  #ui > * { pointer-events: auto; }

  /* Title */
  #title-bar {
    position: absolute; top: 0; left: 0; right: 0;
    display: flex; align-items: center; justify-content: center;
    padding: 10px 0;
    background: linear-gradient(180deg, rgba(13,27,74,0.88) 0%, rgba(13,27,74,0) 100%);
    pointer-events: none;
  }
  #title-bar h1 {
    color: #fff; font-size: 15px; font-weight: 700;
    letter-spacing: 0.2em; text-transform: uppercase;
  }
  .dot { width: 7px; height: 7px; border-radius: 50%; margin: 0 10px; }
  .dot-red { background: #ef5350; animation: pulse 2s infinite; }
  .dot-green { background: #66bb6a; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

  /* View buttons */
  #views {
    position: absolute; top: 48px; left: 10px;
    display: flex; flex-direction: column; gap: 4px;
  }
  .view-btn {
    text-align: left; padding: 5px 11px; border-radius: 4px;
    font-size: 11px; font-weight: 500; letter-spacing: 0.03em;
    color: rgba(255,255,255,0.65); cursor: pointer; border: 1px solid transparent;
    background: rgba(30,30,50,0.6); backdrop-filter: blur(6px);
    transition: all 0.15s;
  }
  .view-btn:hover { background: rgba(30,30,50,0.85); color: #fff; }
  .view-btn.active {
    background: rgba(13,27,74,0.92); color: #fff; font-weight: 700;
    border-color: rgba(100,140,255,0.5);
  }

  /* Legend */
  #legend {
    position: absolute; bottom: 10px; left: 10px;
    background: rgba(13,27,74,0.85); backdrop-filter: blur(8px);
    border-radius: 8px; padding: 12px 14px;
  }
  #legend h4 {
    font-size: 10px; font-weight: 700; letter-spacing: 0.15em;
    color: rgba(255,255,255,0.45); margin-bottom: 8px;
  }
  .leg-row { display: flex; align-items: center; gap: 8px; margin-bottom: 3px; }
  .leg-dot { width: 10px; height: 10px; border-radius: 2px; }
  .leg-row span { font-size: 11px; color: rgba(255,255,255,0.78); }

  /* Info panel */
  #info-panel {
    position: absolute; top: 48px; right: 10px;
    background: rgba(13,27,74,0.92); backdrop-filter: blur(10px);
    border-radius: 8px; padding: 14px 16px; max-width: 250px;
    border: 1px solid rgba(100,140,255,0.25);
    display: none;
  }
  #info-panel.show { display: block; }
  #info-panel h3 { color: #fff; font-size: 13px; font-weight: 700; margin-bottom: 6px; }
  #info-panel p { color: rgba(255,255,255,0.72); font-size: 11px; line-height: 1.6; white-space: pre-line; }
  #info-close {
    position: absolute; top: 8px; right: 10px;
    color: rgba(255,255,255,0.4); font-size: 18px; cursor: pointer;
    background: none; border: none; line-height: 1;
  }
  #info-close:hover { color: #fff; }

  /* Hint */
  #hint {
    position: absolute; bottom: 10px; right: 10px;
    background: rgba(0,0,0,0.35); border-radius: 4px; padding: 4px 8px;
  }
  #hint span { font-size: 10px; color: rgba(255,255,255,0.38); }
</style>
</head>
<body>

<div id="scene-container"></div>

<div id="ui">
  <div id="title-bar">
    <div class="dot dot-red"></div>
    <h1>RAİS — Saha Yerleşim Planı</h1>
    <div class="dot dot-green"></div>
  </div>

  <div id="views"></div>

  <div id="legend">
    <h4>GÖSTERGE</h4>
    <div class="leg-row"><div class="leg-dot" style="background:#0d1b4a;box-shadow:0 0 4px #0d1b4a"></div><span>Modüler Cihaz (MC)</span></div>
    <div class="leg-row"><div class="leg-dot" style="background:#ff6b1a;box-shadow:0 0 4px #ff6b1a"></div><span>Ray Altı Sensör</span></div>
    <div class="leg-row"><div class="leg-dot" style="background:#00acc1;box-shadow:0 0 4px #00acc1"></div><span>Taşkın Sensörü</span></div>
    <div class="leg-row"><div class="leg-dot" style="background:#66bb6a;box-shadow:0 0 4px #66bb6a"></div><span>LoRa Bağlantı</span></div>
    <div class="leg-row"><div class="leg-dot" style="background:#ef5350;box-shadow:0 0 4px #ef5350"></div><span>GSM Bağlantı</span></div>
    <div class="leg-row"><div class="leg-dot" style="background:#ffa726;box-shadow:0 0 4px #ffa726"></div><span>RS485 Hat</span></div>
  </div>

  <div id="info-panel">
    <button id="info-close">&times;</button>
    <h3 id="info-title"></h3>
    <p id="info-body"></p>
  </div>

  <div id="hint"><span>Sürükle: döndür · Scroll: zoom · Tıkla: bilgi</span></div>
</div>

<script type="module">
import * as THREE from 'three';

// ── SCENE SETUP ──
const container = document.getElementById('scene-container');
const scene = new THREE.Scene();
scene.background = new THREE.Color(0xb3d4e8);
scene.fog = new THREE.FogExp2(0xb3d4e8, 0.005);

const camera = new THREE.PerspectiveCamera(50, innerWidth / innerHeight, 0.1, 500);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
container.appendChild(renderer.domElement);

// Lights
scene.add(new THREE.AmbientLight(0xffffff, 0.5));
const sun = new THREE.DirectionalLight(0xfff5e0, 0.9);
sun.position.set(40, 60, 30);
sun.castShadow = true;
sun.shadow.camera.left = -80; sun.shadow.camera.right = 80;
sun.shadow.camera.top = 80; sun.shadow.camera.bottom = -80;
sun.shadow.mapSize.set(2048, 2048);
scene.add(sun);
scene.add(new THREE.HemisphereLight(0x87ceeb, 0x3a6b35, 0.3));

// ── GROUND ──
const groundGeo = new THREE.PlaneGeometry(300, 300, 24, 24);
const ground = new THREE.Mesh(groundGeo, new THREE.MeshLambertMaterial({ color: 0x3a6b35 }));
ground.rotation.x = -Math.PI / 2;
ground.position.y = -0.05;
ground.receiveShadow = true;
scene.add(ground);
// Subtle bumps
const gv = groundGeo.attributes.position;
for (let i = 0; i < gv.count; i++) {
  const x = gv.getX(i), z = gv.getY(i);
  if (Math.abs(x) > 6) gv.setZ(i, gv.getZ(i) + Math.sin(x * 0.1) * 0.5 + Math.cos(z * 0.08) * 0.3);
}
gv.needsUpdate = true;
groundGeo.computeVertexNormals();

// ── RAILWAY TRACK ──
const TL = 160, TS = -60, gauge = 1.435;
const ballast = new THREE.Mesh(
  new THREE.BoxGeometry(4.5, 0.35, TL),
  new THREE.MeshLambertMaterial({ color: 0x606060 })
);
ballast.position.set(0, 0.17, TS + TL / 2);
ballast.receiveShadow = true;
scene.add(ballast);

const railMat = new THREE.MeshStandardMaterial({ color: 0xb8b8b8, metalness: 0.8, roughness: 0.25 });
[-gauge / 2, gauge / 2].forEach(x => {
  const r = new THREE.Mesh(new THREE.BoxGeometry(0.07, 0.14, TL), railMat);
  r.position.set(x, 0.42, TS + TL / 2);
  r.castShadow = true;
  scene.add(r);
});

// Sleepers (instanced)
const slpGeo = new THREE.BoxGeometry(2.6, 0.14, 0.22);
const slpMat = new THREE.MeshLambertMaterial({ color: 0x6d4c2a });
const slpCount = Math.floor(TL / 1.2);
const slpMesh = new THREE.InstancedMesh(slpGeo, slpMat, slpCount);
slpMesh.castShadow = true;
const dm = new THREE.Object3D();
for (let i = 0; i < slpCount; i++) {
  dm.position.set(0, 0.28, TS + i * 1.2);
  dm.updateMatrix();
  slpMesh.setMatrixAt(i, dm.matrix);
}
scene.add(slpMesh);

// ── HELPERS ──
function makeLabel(text, pos, color = '#ffffff', size = 42) {
  const c = document.createElement('canvas');
  c.width = 512; c.height = 128;
  const ctx = c.getContext('2d');
  ctx.font = `bold ${size}px 'Segoe UI', Arial, sans-serif`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  const m = ctx.measureText(text);
  const pw = m.width + 30, ph = size + 16;
  ctx.fillStyle = 'rgba(13,27,74,0.75)';
  ctx.beginPath();
  if (ctx.roundRect) ctx.roundRect(256 - pw / 2, 64 - ph / 2, pw, ph, 8);
  else ctx.rect(256 - pw / 2, 64 - ph / 2, pw, ph);
  ctx.fill();
  ctx.fillStyle = color;
  ctx.fillText(text, 256, 66);
  const tex = new THREE.CanvasTexture(c);
  const sp = new THREE.Sprite(new THREE.SpriteMaterial({ map: tex, transparent: true, depthTest: false }));
  sp.position.copy(pos);
  sp.scale.set(9, 2.25, 1);
  scene.add(sp);
}

function curvedLine(from, to, color) {
  const a = new THREE.Vector3(...from), b = new THREE.Vector3(...to);
  const mid = a.clone().add(b).multiplyScalar(0.5);
  mid.y += 3;
  const pts = [];
  for (let i = 0; i <= 30; i++) {
    const t = i / 30;
    pts.push(new THREE.Vector3()
      .addScaledVector(a, (1 - t) * (1 - t))
      .addScaledVector(mid, 2 * (1 - t) * t)
      .addScaledVector(b, t * t));
  }
  const geo = new THREE.BufferGeometry().setFromPoints(pts);
  const line = new THREE.Line(geo, new THREE.LineDashedMaterial({
    color, dashSize: 0.8, gapSize: 0.4, transparent: true, opacity: 0.7
  }));
  line.computeLineDistances();
  scene.add(line);
}

function solidLine(from, to, color) {
  const geo = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(...from), new THREE.Vector3(...to)]);
  scene.add(new THREE.Line(geo, new THREE.LineBasicMaterial({ color })));
}

// ── MC UNITS ──
function createMC(x, z, name, desc) {
  const g = new THREE.Group();
  const box = new THREE.Mesh(
    new THREE.BoxGeometry(1.3, 1.6, 0.9),
    new THREE.MeshStandardMaterial({ color: 0x0d1b4a, metalness: 0.2, roughness: 0.5 })
  );
  box.position.y = 1.3; box.castShadow = true;
  box.userData = { name, info: desc };
  g.add(box);
  // Front panel
  const fp = new THREE.Mesh(new THREE.BoxGeometry(0.9, 1.1, 0.02), new THREE.MeshStandardMaterial({ color: 0x1a3a7a }));
  fp.position.set(0, 1.3, 0.46); g.add(fp);
  // LED
  const led = new THREE.Mesh(new THREE.SphereGeometry(0.06, 8, 8), new THREE.MeshBasicMaterial({ color: 0x00e676 }));
  led.position.set(0.45, 1.9, 0.46); g.add(led);
  // Antenna
  const ant = new THREE.Mesh(new THREE.CylinderGeometry(0.025, 0.025, 1.2, 6), new THREE.MeshStandardMaterial({ color: 0x333333 }));
  ant.position.set(0.35, 2.7, 0); g.add(ant);
  const tip = new THREE.Mesh(new THREE.SphereGeometry(0.06, 6, 6), new THREE.MeshStandardMaterial({ color: 0x222222 }));
  tip.position.set(0.35, 3.35, 0); g.add(tip);
  // Solar panel
  const sp = new THREE.Mesh(new THREE.BoxGeometry(1.1, 0.06, 0.7), new THREE.MeshStandardMaterial({ color: 0x0a1940, metalness: 0.6, roughness: 0.15 }));
  sp.position.set(-0.2, 2.4, 0); sp.rotation.x = -0.4; sp.castShadow = true; g.add(sp);
  // Pole
  const pole = new THREE.Mesh(new THREE.CylinderGeometry(0.06, 0.08, 0.5, 8), new THREE.MeshStandardMaterial({ color: 0x666666 }));
  pole.position.y = 0.25; g.add(pole);
  g.position.set(x, 0, z);
  scene.add(g);
  makeLabel(name, new THREE.Vector3(x, 4.5, z));
  return box;
}

createMC(4.5, -25, 'MC-1', 'Modüler Cihaz 1\nRay altı boşalma sensörleri bağlı\nRS485 + LoRa haberleşme\nGüneş paneli ile besleme\nDurum: Aktif ✓');
createMC(4.5, 45, 'MC-2', 'Modüler Cihaz 2\nRay altı boşalma sensörleri bağlı\nRS485 + LoRa haberleşme\nGüneş paneli ile besleme\nDurum: Aktif ✓');
createMC(-5, 10, 'MC-3 (Menfez)', 'Modüler Cihaz 3\nMenfez taşkın tespit sensörü bağlı\nLoRa haberleşme\nSu seviye + akış izleme\nDurum: Aktif ✓');

// ── RAIL SENSORS ──
function createSensor(z, name) {
  const s = new THREE.Mesh(
    new THREE.BoxGeometry(0.5, 0.07, 0.35),
    new THREE.MeshStandardMaterial({ color: 0xff6b1a, emissive: 0xff6b1a, emissiveIntensity: 0.25 })
  );
  s.position.set(0, 0.38, z); s.castShadow = true;
  s.userData = { name, info: 'Ray Altı Boşalma Sensörü\nRay-travers arasına monte\nRS485 ile MC\'ye bağlı\nTitreşim + sıcaklık ölçümü\nÖrnekleme: 1 kHz' };
  scene.add(s);
  const ring = new THREE.Mesh(
    new THREE.TorusGeometry(0.35, 0.015, 8, 24),
    new THREE.MeshBasicMaterial({ color: 0xff6b1a, transparent: true, opacity: 0.4 })
  );
  ring.position.set(0, 0.39, z); ring.rotation.x = Math.PI / 2;
  scene.add(ring);
  return s;
}
createSensor(-26, 'Sensör S1');
createSensor(-24, 'Sensör S2');
createSensor(44, 'Sensör S3');
createSensor(46, 'Sensör S4');

// ── MENFEZ (CULVERT) ──
const menfezG = new THREE.Group();
const wallMat = new THREE.MeshStandardMaterial({ color: 0x8a8a8a, roughness: 0.9 });
[2, -2].forEach(dz => {
  const w = new THREE.Mesh(new THREE.BoxGeometry(7, 2.5, 0.4), wallMat);
  w.position.set(0, 0.25, dz); w.castShadow = true;
  menfezG.add(w);
});
const arch = new THREE.Mesh(
  new THREE.CylinderGeometry(1.4, 1.4, 4, 20, 1, true, 0, Math.PI),
  new THREE.MeshStandardMaterial({ color: 0x6d6d6d, side: THREE.DoubleSide })
);
arch.rotation.x = Math.PI / 2; arch.position.y = 0.1;
menfezG.add(arch);
const water = new THREE.Mesh(
  new THREE.PlaneGeometry(2.4, 4),
  new THREE.MeshStandardMaterial({ color: 0x1565c0, transparent: true, opacity: 0.55, metalness: 0.3, roughness: 0.2 })
);
water.rotation.x = -Math.PI / 2; water.position.y = -0.4;
menfezG.add(water);
// Flood sensor
const fs = new THREE.Mesh(
  new THREE.CylinderGeometry(0.08, 0.08, 0.8, 8),
  new THREE.MeshStandardMaterial({ color: 0x00acc1, emissive: 0x00acc1, emissiveIntensity: 0.3 })
);
fs.position.set(-1.5, 0.4, 0);
fs.userData = { name: 'Taşkın Sensörü', info: 'Menfez Taşkın Tespit Sensörü\nUltrasonik su seviye ölçümü\nAkış hızı takibi\nMC-3\'e LoRa ile bağlı\nEşik aşımında alarm üretir\nKonum: Menfez girişi' };
menfezG.add(fs);
// Mount bracket
const br = new THREE.Mesh(new THREE.BoxGeometry(0.15, 1.2, 0.15), new THREE.MeshStandardMaterial({ color: 0x555555 }));
br.position.set(-1.5, 1.1, 0); menfezG.add(br);
menfezG.position.set(0, -0.6, 10);
scene.add(menfezG);
makeLabel('Menfez', new THREE.Vector3(0, 3.5, 10), '#00e5ff');

// ── LoRa GATEWAY ──
const loraG = new THREE.Group();
const lPoleMat = new THREE.MeshStandardMaterial({ color: 0x757575, metalness: 0.4 });
const lPole = new THREE.Mesh(new THREE.CylinderGeometry(0.12, 0.18, 10, 8), lPoleMat);
lPole.position.y = 5; lPole.castShadow = true; loraG.add(lPole);
[-1, 1].forEach(s => {
  const arm = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.04, 1.5, 6), lPoleMat);
  arm.position.set(s * 0.5, 9.5, 0); arm.rotation.z = Math.PI / 2; loraG.add(arm);
});
for (let i = -1; i <= 1; i++) {
  const a = new THREE.Mesh(new THREE.CylinderGeometry(0.02, 0.02, 1.8, 6), new THREE.MeshStandardMaterial({ color: 0x333333 }));
  a.position.set(i * 0.4, 11, 0); loraG.add(a);
}
const gwBox = new THREE.Mesh(new THREE.BoxGeometry(0.7, 0.5, 0.35), new THREE.MeshStandardMaterial({ color: 0x2e7d32 }));
gwBox.position.y = 8.5;
gwBox.userData = { name: 'LoRa Gateway', info: 'LoRa Ağ Geçidi\n868 MHz ISM bandı\nTüm MC\'lerden veri toplama\nStar topoloji\nMenzil: ~5 km görüş hattı\nGSM ile merkeze iletim' };
loraG.add(gwBox);
loraG.position.set(14, 0, 15);
scene.add(loraG);
makeLabel('LoRa GW', new THREE.Vector3(14, 13, 15), '#81c784');

// ── GSM TOWER ──
const gsmG = new THREE.Group();

for (let i = 0; i < 3; i++) {

  brace.position.y = h; gsmG.add(brace);
}
const gPanel = new THREE.Mesh(new THREE.BoxGeometry(0.25, 1.2, 0.08), new THREE.MeshStandardMaterial({ color: 0xfafafa }));
gPanel.position.set(0, 13.5, 0.7);
gPanel.userData = { name: 'GSM Modül', info: 'GSM/4G Haberleşme Modülü\nLoRa GW\'den merkeze veri iletimi\nVPN tüneli ile güvenli bağlantı\nYedek hat: Uydu modem\nOperatör: Çift SIM' };
gsmG.add(gPanel);
gsmG.position.set(22, 0, 15);
scene.add(gsmG);
makeLabel('GSM', new THREE.Vector3(22, 16, 15), '#ef9a9a');

// ── CENTRAL STATION ──
const csG = new THREE.Group();
const bldg = new THREE.Mesh(
  new THREE.BoxGeometry(10, 5, 7),
  new THREE.MeshStandardMaterial({ color: 0xe8e8e8, roughness: 0.7 })
);
bldg.position.y = 2.5; bldg.castShadow = true;
bldg.userData = { name: 'Merkez İstasyon', info: 'RAİS Merkez İzleme İstasyonu\nWeb tabanlı kontrol paneli\nPrediktif bakım analizi\nAlarm yönetimi & eskalasyon\nHarita tabanlı cihaz izleme\nRaporlama & veri arşivi' };
csG.add(bldg);
// Roof
const roof = new THREE.Mesh(new THREE.BoxGeometry(10.5, 0.35, 7.5), new THREE.MeshStandardMaterial({ color: 0x37474f }));
roof.position.y = 5.18; csG.add(roof);
// Door
const door = new THREE.Mesh(new THREE.BoxGeometry(1.4, 2.5, 0.06), new THREE.MeshStandardMaterial({ color: 0x4e342e }));
door.position.set(0, 1.25, 3.53); csG.add(door);
// Windows
const winMat = new THREE.MeshStandardMaterial({ color: 0x90caf9, emissive: 0x42a5f5, emissiveIntensity: 0.15 });
[-3, -1.5, 1.5, 3].forEach(x => {
  const w = new THREE.Mesh(new THREE.BoxGeometry(1, 1.2, 0.06), winMat);
  w.position.set(x, 3.2, 3.53); csG.add(w);
});
// Satellite dish
const dish = new THREE.Mesh(
  new THREE.SphereGeometry(0.6, 16, 8, 0, Math.PI),
  new THREE.MeshStandardMaterial({ color: 0xeeeeee, side: THREE.DoubleSide })
);
dish.position.set(3.5, 5.8, -1); dish.rotation.x = -0.6; csG.add(dish);
// RAİS sign
const signC = document.createElement('canvas');
signC.width = 256; signC.height = 64;
const sctx = signC.getContext('2d');
sctx.fillStyle = '#0d1b4a'; sctx.fillRect(0, 0, 256, 64);
sctx.font = 'bold 36px Arial'; sctx.fillStyle = '#fff'; sctx.textAlign = 'center';

scene.add(csG);
makeLabel('Merkez İstasyon', new THREE.Vector3(0, 8, 85), '#eceff1');

// ── COMM LINKS ──
solidLine([4.5, 1.3, -25], [0.5, 0.5, -25], 0xffa726);
solidLine([4.5, 1.3, 45], [0.5, 0.5, 45], 0xffa726);

// ── TREES ──
function makeTree(x, z) {
  const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.15, 0.2, 2, 6), new THREE.MeshLambertMaterial({ color: 0x5d4037 }));
  trunk.position.set(x, 1, z); trunk.castShadow = true; scene.add(trunk);
  const crown = new THREE.Mesh(new THREE.SphereGeometry(1.2, 8, 6), new THREE.MeshLambertMaterial({ color: 0x2e7d32 }));
  crown.position.set(x, 2.8, z); crown.castShadow = true; scene.add(crown);
}
[[-8, 78], [-10, 82], [-7, 88], [8, 90], [7, 82], [-12, 30], [10, -10], [-9, 55]].forEach(([x, z]) => makeTree(x, z));

// Gravel path
const gPath = new THREE.Mesh(new THREE.BoxGeometry(2, 0.02, 12), new THREE.MeshLambertMaterial({ color: 0x9e9e9e }));
gPath.position.set(0, 0.01, 78); scene.add(gPath);

// ── ORBIT CONTROLS ──
let sph = { theta: 0.55, phi: 0.95, radius: 75 };
let target = new THREE.Vector3(2, 2, 15);
let dragging = false, prev = { x: 0, y: 0 };

function camUpdate() {
  camera.position.set(
    target.x + sph.radius * Math.sin(sph.phi) * Math.sin(sph.theta),
    target.y + sph.radius * Math.cos(sph.phi),
    target.z + sph.radius * Math.sin(sph.phi) * Math.cos(sph.theta)
  );
  camera.lookAt(target);
}
camUpdate();

const cvs = renderer.domElement;
cvs.addEventListener('mousedown', e => { dragging = true; prev = { x: e.clientX, y: e.clientY }; });
cvs.addEventListener('mousemove', e => {
  if (!dragging) return;
  sph.theta -= (e.clientX - prev.x) * 0.005;
  sph.phi = Math.max(0.15, Math.min(2.5, sph.phi + (e.clientY - prev.y) * 0.005));
  prev = { x: e.clientX, y: e.clientY };
  camUpdate();
});
cvs.addEventListener('mouseup', () => dragging = false);
cvs.addEventListener('mouseleave', () => dragging = false);
cvs.addEventListener('wheel', e => {
  sph.radius = Math.max(10, Math.min(160, sph.radius + e.deltaY * 0.06));
  camUpdate();
}, { passive: true });

// Touch
let tDist = 0;
cvs.addEventListener('touchstart', e => {
  if (e.touches.length === 1) { dragging = true; prev = { x: e.touches[0].clientX, y: e.touches[0].clientY }; }
  if (e.touches.length === 2) {
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    tDist = Math.sqrt(dx * dx + dy * dy);
  }
});
cvs.addEventListener('touchmove', e => {
  e.preventDefault();
  if (e.touches.length === 1 && dragging) {
    sph.theta -= (e.touches[0].clientX - prev.x) * 0.005;
    sph.phi = Math.max(0.15, Math.min(2.5, sph.phi + (e.touches[0].clientY - prev.y) * 0.005));
    prev = { x: e.touches[0].clientX, y: e.touches[0].clientY };
    camUpdate();
  }
  if (e.touches.length === 2) {
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    const d = Math.sqrt(dx * dx + dy * dy);
    sph.radius = Math.max(10, Math.min(160, sph.radius - (d - tDist) * 0.15));
    tDist = d; camUpdate();
  }
}, { passive: false });
cvs.addEventListener('touchend', () => dragging = false);

// ── RAYCASTING ──
const raycaster = new THREE.Raycaster();
const mouseVec = new THREE.Vector2();
const infoPanel = document.getElementById('info-panel');
const infoTitle = document.getElementById('info-title');
const infoBody = document.getElementById('info-body');
document.getElementById('info-close').onclick = () => infoPanel.classList.remove('show');

cvs.addEventListener('click', e => {
  const r = cvs.getBoundingClientRect();
  mouseVec.set(((e.clientX - r.left) / r.width) * 2 - 1, -((e.clientY - r.top) / r.height) * 2 + 1);
  raycaster.setFromCamera(mouseVec, camera);
  const hits = [];
  scene.traverse(o => { if (o.isMesh && o.userData?.name) hits.push(o); });
  const ix = raycaster.intersectObjects(hits, false);
  if (ix.length > 0 && ix[0].object.userData.name) {
    infoTitle.textContent = ix[0].object.userData.name;
    infoBody.textContent = ix[0].object.userData.info;
    infoPanel.classList.add('show');
  }
});

// ── PRESET VIEWS ──
const viewDefs = {
  genel:    { theta: 0.55, phi: 0.95, radius: 75, t: [2, 2, 15] },
  üst:      { theta: 0, phi: 0.08, radius: 110, t: [0, 0, 15] },
  yan:      { theta: Math.PI / 2, phi: 1.15, radius: 55, t: [0, 2, 15] },
  mc1:      { theta: 0.4, phi: 1.0, radius: 14, t: [3, 1, -25] },
  mc2:      { theta: 0.4, phi: 1.0, radius: 14, t: [3, 1, 45] },
  menfez:   { theta: -0.5, phi: 1.0, radius: 14, t: [0, 0, 10] },
  iletişim: { theta: 0.3, phi: 0.85, radius: 35, t: [14, 5, 15] },
  merkez:   { theta: 0.25, phi: 0.9, radius: 22, t: [0, 3, 85] },
};
const viewLabels = {
  genel: 'Genel Görünüm', üst: 'Kuşbakışı', yan: 'Yan Görünüm',
  mc1: 'MC-1 Yakın', mc2: 'MC-2 Yakın', menfez: 'Menfez',
  iletişim: 'İletişim Kuleleri', merkez: 'Merkez İstasyon',
};

const viewsEl = document.getElementById('views');
let activeView = 'genel';
Object.entries(viewLabels).forEach(([id, label]) => {
  const btn = document.createElement('button');
  btn.className = 'view-btn' + (id === 'genel' ? ' active' : '');
  btn.textContent = label;
  btn.dataset.id = id;
  btn.onclick = () => {
    document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const v = viewDefs[id];
    sph = { theta: v.theta, phi: v.phi, radius: v.radius };
    target = new THREE.Vector3(...v.t);
    camUpdate();
  };
  viewsEl.appendChild(btn);
});

// ── RENDER LOOP ──
function animate() {
  requestAnimationFrame(animate);
  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>
